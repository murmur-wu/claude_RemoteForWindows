name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute next version
        id: version
        run: python .github/scripts/next_version.py >> "$GITHUB_OUTPUT"

      - name: Stop if HEAD is already released
        if: steps.version.outputs.should_release != 'true'
        run: echo "HEAD already has release tag ${{ steps.version.outputs.tag }}"

      - name: Create release archives
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          zip -r "dist/remotetools-${VERSION}-source.zip" .github .gitignore README.md LICENSE CLAUDE.md telegram discord services \
            -x "telegram/.venv/*" "discord/.venv/*" ".git/*" "telegram/state/*" "discord/state/*" "services/logs/*"
          zip -r "dist/remotetools-${VERSION}-telegram.zip" telegram README.md LICENSE \
            -x "telegram/.venv/*" "telegram/state/*"
          zip -r "dist/remotetools-${VERSION}-discord.zip" discord README.md LICENSE \
            -x "discord/.venv/*" "discord/state/*"
          zip -r "dist/remotetools-${VERSION}-services.zip" services README.md LICENSE \
            -x "services/logs/*" "services/nssm.exe"

      - name: Create git tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.zip